<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>AI基礎知識スライド (デモ)</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: system-ui, -apple-system, sans-serif;
      background: #ffffff;
      color: #333333;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      border: 1px solid #e0e0e0;
      box-sizing: border-box;
    }
    .slide-container {
      width: 100%;
      height: 100%;
      position: relative;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .slide {
      display: none;
      width: 75%;
      max-width: 550px;
      text-align: center;
      animation: fadeIn 0.4s ease-in-out forwards;
    }
    .slide.active {
      display: block;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .slide h2 {
      color: #2f6f73; /* ブランドのティールカラー */
      font-size: 2rem;
      margin-bottom: 20px;
      font-weight: 800;
    }
    .slide p {
      font-size: 1.1rem;
      line-height: 1.7;
      color: #555555;
    }
    .nav-btn {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: #ffffff;
      border: 1px solid #cccccc;
      color: #2f6f73;
      font-size: 1.2rem;
      padding: 10px 14px;
      cursor: pointer;
      border-radius: 50%;
      transition: all 0.2s ease;
      box-shadow: 0 2px 6px rgba(0,0,0,0.06);
      display: flex;
      align-items: center;
      justify-content: center;
      width: 44px;
      height: 44px;
    }
    .nav-btn:hover {
      background: #e6f0ef;
      border-color: #2f6f73;
      transform: translateY(-50%) scale(1.05);
    }
    .prev-btn { left: 24px; }
    .next-btn { right: 24px; }
    .indicator {
      position: absolute;
      bottom: 20px;
      right: 24px; /* フッター右端に配置 */
      font-size: 0.9rem;
      font-weight: 600;
      color: #666666;
      background: #f5f5f5;
      padding: 4px 10px;
      border-radius: 12px;
      letter-spacing: 0.05em;
    }
  </style>
</head>
<body>
  <div class="slide-container">
    <button class="nav-btn prev-btn" onclick="changeSlide(-1)">◀</button>
    
    <div class="slide active">
      <h2>AIの基礎知識</h2>
      <p>人工知能（AI）は、人間の考える・学習する・判断するなどの知的能力をコンピューター技術で再現するものです。</p>
    </div>
    
    <div class="slide">
      <h2>AIの主な分類</h2>
      <p>特定のタスクに特化した「特化型AI」と、人間のように幅広い思考が可能な「汎用型AI（AGI）」に分類されます。</p>
    </div>
    
    <div class="slide">
      <h2>生成AI（Generative AI）</h2>
      <p>大量のデータを学習し、テキストや画像、音楽などの新しいコンテンツを自律的に創造する最先端 of AI技術です。</p>
    </div>
    
    <button class="nav-btn next-btn" onclick="changeSlide(1)">▶</button>
    <div class="indicator" id="slide-indicator">1 / 3</div>
  </div>

  <script>
    let currentSlide = 0;
    const slides = document.querySelectorAll('.slide');
    const indicator = document.getElementById('slide-indicator');

    function changeSlide(direction) {
      slides[currentSlide].classList.remove('active');
      currentSlide = (currentSlide + direction + slides.length) % slides.length;
      slides[currentSlide].classList.add('active');
      indicator.textContent = `${currentSlide + 1} / ${slides.length}`;
    }
  </script>
</body>
</html>
